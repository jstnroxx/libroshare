<nav class="navbar">
  <a routerLink="/" 
     class="logo" 
     routerLinkActive="active" 
     [routerLinkActiveOptions]="{exact: true}">
    LibroShare
  </a>

  <div class="nav-links">
    <a routerLink="/books" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Books</a>
    <a routerLink="/my-books" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">My Shelf</a>
    <a routerLink="/requests" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Requests</a>
    <a routerLink="/add-book" class="add-btn">Add Book</a>
  </div>

  <div class="user-actions">
    @if (authService.isAuthenticated()) {
        <a [routerLink]="['/profile', myId]" 
          class="profile-link" 
          routerLinkActive="active">
          Profile
        </a>
        <button class="logout-btn" (click)="logout()">Logout</button>
    } @else {
        <a class="login-link" 
          routerLink="/login" 
          routerLinkActive="active">
          Login
        </a>
    }
  </div>
</nav>
