<div class="container">
  <h2 class="section-title">Library Collection</h2>

  <div class="book-grid">
    @for (book of (books$ | async); track book.id) {
      <app-book-card [book]="book"></app-book-card>
    } @empty {
      <div class="empty-state">
        <p>No books found in the collection.</p>
      </div>
    }
  </div>
</div>
